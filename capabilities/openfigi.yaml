naftiko: 1.0.0-alpha2
info:
  label: OpenFIGI API
  description: 'OpenFIGI API. 4 operations. Lead operation: OpenFIGI API. Self-contained Naftiko capability covering one Openfigi
    business surface.'
  tags:
  - Openfigi
  - OpenFIGI API
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    OPENFIGI_API_KEY: OPENFIGI_API_KEY
capability:
  consumes:
  - type: http
    namespace: openfigi
    baseUri: https://api.openfigi.com/{basePath}
    description: OpenFIGI API business capability. Self-contained, no shared references.
    resources:
    - name: filter
      path: /filter
      operations:
      - name: post
        method: POST
        description: Search for FIGIs using key words and other filters. The results are listed alphabetically by FIGI and
          include the number of results.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: mapping
      path: /mapping
      operations:
      - name: post
        method: POST
        description: Allows mapping from third-party identifiers to FIGIs.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: mapping-values-key
      path: /mapping/values/{key}
      operations:
      - name: get
        method: GET
        description: Get values for enum-like fields.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: key
          in: path
          type: string
          description: Key of MappingJob for which to get possible values.
          required: true
    - name: search
      path: /search
      operations:
      - name: post
        method: POST
        description: Search for FIGIs using key words and other filters.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: apikey
      key: X-OPENFIGI-APIKEY
      value: '{{env.OPENFIGI_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: openfigi-rest
    port: 8080
    description: REST adapter for OpenFIGI API. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/filter
      name: filter
      description: REST surface for filter.
      operations:
      - method: POST
        name: post
        description: Search for FIGIs using key words and other filters. The results are listed alphabetically by FIGI and
          include the number of results.
        call: openfigi.post
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/mapping
      name: mapping
      description: REST surface for mapping.
      operations:
      - method: POST
        name: post
        description: Allows mapping from third-party identifiers to FIGIs.
        call: openfigi.post
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/mapping/values/{key}
      name: mapping-values-key
      description: REST surface for mapping-values-key.
      operations:
      - method: GET
        name: get
        description: Get values for enum-like fields.
        call: openfigi.get
        with:
          key: rest.key
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/search
      name: search
      description: REST surface for search.
      operations:
      - method: POST
        name: post
        description: Search for FIGIs using key words and other filters.
        call: openfigi.post
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: openfigi-mcp
    port: 9090
    transport: http
    description: MCP adapter for OpenFIGI API. One tool per consumed operation, routed inline through this capability's consumes
      block.
    tools:
    - name: search-figis-using-key-words
      description: Search for FIGIs using key words and other filters. The results are listed alphabetically by FIGI and include
        the number of results.
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: openfigi.post
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: allows-mapping-third-party-identifiers
      description: Allows mapping from third-party identifiers to FIGIs.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: openfigi.post
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-values-enum-like-fields
      description: Get values for enum-like fields.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: openfigi.get
      with:
        key: tools.key
      outputParameters:
      - type: object
        mapping: $.
    - name: search-figis-using-key-words-2
      description: Search for FIGIs using key words and other filters.
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: openfigi.post
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
